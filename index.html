<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RBX Radar Dashboard</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0f19;
      color: white;
    }

    .navbar {
      background: #111827;
      padding: 15px 25px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #1f2937;
    }

    .logo {
      font-size: 20px;
      font-weight: bold;
      color: #00a2ff;
    }

    .btn {
      background: #00a2ff;
      border: none;
      padding: 8px 14px;
      border-radius: 6px;
      color: white;
      cursor: pointer;
    }

    .container {
      padding: 30px;
    }

    .title {
      font-size: 26px;
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
    }

    .card {
      background: #111827;
      padding: 20px;
      border-radius: 12px;
      border: 1px solid #1f2937;
      transition: 0.2s;
    }

    .card:hover {
      transform: scale(1.03);
      border-color: #00a2ff;
    }

    .card h3 {
      margin: 0;
      color: #00a2ff;
    }

    .card p {
      color: #9ca3af;
      font-size: 14px;
    }

    .search {
      margin: 20px 0;
      display: flex;
      gap: 10px;
    }

    .search input {
      flex: 1;
      padding: 10px;
      border-radius: 6px;
      border: none;
      outline: none;
      background: #1f2937;
      color: white;
    }
  </style>
</head>

<body>

  <div class="navbar">
    <div class="logo">🎮 RBX Radar</div>
    <button class="btn">Dashboard</button>
  </div>

  <div class="container">

    <div class="title">Roblox Tracking Dashboard</div>

    <div class="search">
      <input type="text" placeholder="Search Roblox username..." />
      <button class="btn">Search</button>
    </div>

    <div class="grid">

      <div class="card">
        <h3>🔍 User Lookup</h3>
        <p>Search Roblox players instantly</p>
      </div>

      <div class="card">
        <h3>📊 Stats</h3>
        <p>View tracking analytics</p>
      </div>

      <div class="card">
        <h3>🤖 Bot Status</h3>
        <p>Check Discord bot online status</p>
      </div>

      <div class="card">
        <h3>⚡ Radar System</h3>
        <p>Real-time tracking system</p>
      </div>

    </div>

  </div>

</body>
</html>
